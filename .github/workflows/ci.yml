name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  wasm-build:
    runs-on: ubuntu-latest
    needs: [fmt, clippy, test]
    strategy:
      matrix:
        contract:
          - vault
          - policy-venue
          - policy-recall
          - policy-session
          - oracle-router
          - health-monitor
          - timelock
          - risk-engine
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none
      - uses: Swatinem/rust-cache@v2
      # soroban-sdk's experimental_spec_shaking_v2 feature (required by
      # stellar-accounts =0.7.2, see adr/0004) only builds via the real
      # `stellar contract build` command — it sets an env var plain `cargo
      # build` does not. stellar-cli has no prebuilt-binary GitHub Action
      # as of writing, so cache the cargo-installed binary keyed on version
      # rather than recompiling it (~19min from scratch) on every run.
      - name: cache stellar-cli
        id: cache-stellar-cli
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/stellar
          key: stellar-cli-27.0.0-${{ runner.os }}
      - name: install stellar-cli
        if: steps.cache-stellar-cli.outputs.cache-hit != 'true'
        run: cargo install stellar-cli --version 27.0.0
      - name: build wasm
        run: stellar contract build --package refluo-${{ matrix.contract }}
      - name: wasm size budget (alarm > 64KB)
        run: |
          set -euo pipefail
          f="target/wasm32v1-none/release/refluo_${{ matrix.contract }}.wasm"
          f="${f//-/_}"
          size=$(stat -c%s "$f")
          echo "size: $size bytes"
          if [ "$size" -gt 65536 ]; then
            echo "::error::${{ matrix.contract }} wasm is ${size} bytes, over the 64KB budget"
            exit 1
          fi
